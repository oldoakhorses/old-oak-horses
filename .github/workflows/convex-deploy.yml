name: Deploy Convex Backend

on:
  push:
    branches:
      - main
      - "claude/**"
    paths:
      - "convex/**"
      - ".github/workflows/convex-deploy.yml"
  workflow_dispatch:

concurrency:
  group: convex-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Debug key format
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: |
          echo "Key length: ${#CONVEX_DEPLOY_KEY}"
          echo "Key prefix: ${CONVEX_DEPLOY_KEY:0:30}"
          echo "Key has newline: $(echo "$CONVEX_DEPLOY_KEY" | wc -l)"
          echo "Key trimmed length: $(echo -n "$CONVEX_DEPLOY_KEY" | tr -d '[:space:]' | wc -c)"

      - name: Deploy to Convex
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_DEPLOYMENT }}
        run: |
          export CONVEX_DEPLOY_KEY="$(echo -n "$CONVEX_DEPLOY_KEY" | tr -d '[:space:]')"
          npx convex deploy

