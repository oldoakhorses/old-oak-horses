name: Deploy Convex Backend

on:
  push:
    branches:
      - main
      - "claude/**"
    paths:
      - "convex/**"
      - ".github/workflows/convex-deploy.yml"
  workflow_dispatch:

concurrency:
  group: convex-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Convex
        # Set the CONVEX_DEPLOY_KEY repository secret to the FULL deploy key
        # as Convex generates it, e.g. "prod:fabulous-mastiff-759|<token>".
        # Get one from: https://dashboard.convex.dev → project fabulous-mastiff-759
        # → Settings → Deploy Keys → Generate Production Deploy Key
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: npx convex deploy --yes
